name: Feed Open Brain
on:
  push:
    branches: ["**"]

jobs:
  brain-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send commit to Open Brain
        env:
          BRAIN_INGEST_URL: ${{ secrets.BRAIN_INGEST_URL }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          MSG="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          SHA="${{ github.sha }}"
          FILES=$(git diff-tree --no-commit-id -r --name-only HEAD | tr '\n' ', ')

          curl -s -X POST "$BRAIN_INGEST_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"Git commit in $REPO on $BRANCH by $AUTHOR: $MSG | Changed files: $FILES\",
              \"source\": \"github_commit\",
              \"tags\": [\"git\", \"commit\", \"$REPO\"],
              \"metadata\": {
                \"sha\": \"$SHA\",
                \"repo\": \"$REPO\",
                \"branch\": \"$BRANCH\",
                \"author\": \"$AUTHOR\",
                \"files\": \"$FILES\"
              }
            }"
